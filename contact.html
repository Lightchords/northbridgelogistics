<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — Global Express Delivery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="container py-5">
    <h2>Contact Us</h2>
    <div class="row">
      <div class="col-md-6">
        <form action="https://formsubmit.co/support@globalexpressdelivery.site" method="POST">
          <input type="hidden" name="_subject" value="Contact from website">
          <div class="mb-3"><label class="form-label">Name</label><input class="form-control" name="name" required></div>
          <div class="mb-3"><label class="form-label">Email</label><input class="form-control" type="email" name="email" required></div>
          <div class="mb-3"><label class="form-label">Message</label><textarea class="form-control" name="message" rows="5" required></textarea></div>
          <button class="btn btn-primary">Send Message</button>
        </form>
      </div>
      <div class="col-md-6">
        <h5>Our Offices</h5>
        <p><strong>UK Office:</strong> +44 7474 179851</p>
        <p><strong>US Office:</strong> +1 (929) 400-8690</p>
        <h6>58 Chetwynd Road</h6>
        <p>London, England, NW$ 1DN</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
