<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Get a Quote — Global Express Delivery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="container py-5">
    <div class="card card-glass mx-auto" style="max-width:900px;">
      <div class="card-body">
        <h3>Request a Shipping Quote</h3>
        <p class="text-muted">Fill the details and we'll email you a tailored quote.</p>

        <form action="https://formsubmit.co/support@globalexpressdelivery.site" method="POST" novalidate>
          <input type="hidden" name="_subject" value="New Quote Request">
          <input type="hidden" name="_next" value="thankyou.html">
          <div class="row g-3">
            <div class="col-md-6"><input name="name" class="form-control" placeholder="Full name" required></div>
            <div class="col-md-6"><input name="email" type="email" class="form-control" placeholder="Email address" required></div>
            <div class="col-md-6"><input name="phone" class="form-control" placeholder="Phone number" required></div>
            <div class="col-md-6"><input name="pickup" class="form-control" placeholder="Pickup city, country" required></div>
            <div class="col-md-6"><input name="destination" class="form-control" placeholder="Delivery city, country" required></div>
            <div class="col-md-3"><input name="weight" class="form-control" placeholder="Weight (kg)"></div>
            <div class="col-md-3"><select name="package" class="form-select"><option>Parcel</option><option>Crate</option><option>Pallet</option></select></div>
            <div class="col-12"><textarea name="message" class="form-control" rows="4" placeholder="Additional details"></textarea></div>
            <div class="col-12 d-flex gap-2">
              <button class="btn btn-success" type="submit">Send Request</button>
              <button id="previewQuote" type="button" class="btn btn-outline-secondary">Preview Estimate</button>
            </div>
            <div id="quotePreview" class="mt-3" style="display:none;"></div>
          </div>
        </form>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    document.getElementById('previewQuote').addEventListener('click', function(){
      const preview = document.getElementById('quotePreview');
      preview.style.display = 'block';
      preview.innerHTML = '<div class="alert alert-info">Sample estimate: <strong>$420</strong> — Air Express (2–4 days). This is a demo preview.</div>';
      setTimeout(()=> preview.style.display='none', 7000);
    });
  </script>
</body>
</html>
