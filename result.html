<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shipment Tracking System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- GOOGLE FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    body {
        font-family: "Poppins", sans-serif;
        background: #0f0f0f;
        color: #fff;
        margin: 0;
        padding: 0;
    }

    .container {
        max-width: 900px;
        margin: auto;
        padding: 30px;
    }

    h1 {
        text-align: center;
        font-size: 32px;
        margin-bottom: 15px;
        text-shadow: 0 0 15px #00ffcc;
    }

    .card {
        background: #1a1a1a;
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0px 0px 25px rgba(0,255,200,0.25);
    }

    input {
        width: 100%;
        padding: 15px;
        font-size: 17px;
        border-radius: 10px;
        border: none;
        outline: none;
        margin-bottom: 15px;
        background: #111;
        color: #fff;
        border: 1px solid #00ffcc;
    }

    .btn {
        background: #00ffcc;
        padding: 14px 20px;
        width: 100%;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
        font-weight: 600;
        color: #000;
        transition: 0.25s;
    }
    .btn:hover {
        background: #00e6b8;
        box-shadow: 0 0 18px #00ffcc;
    }

    /* Loader Spin */
    .loader {
        border: 5px solid #111;
        border-top: 5px solid #00ffcc;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
        display: none;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* Timeline */
    .timeline-item {
        background: #111;
        padding: 12px 15px;
        border-radius: 8px;
        margin-bottom: 12px;
        border-left: 4px solid #00ffcc;
        animation: fade 0.6s;
    }

    @keyframes fade {
        from {opacity: 0; transform: translateX(-10px);}
        to {opacity: 1; transform: translateX(0);}
    }

    .success-text {
        color: #00ffcc;
        font-weight: 600;
    }
</style>
</head>

<body>
<div class="container">

    <h1>Shipment Tracking</h1>

    <div class="card">
        <input id="trackingInput" placeholder="Enter tracking number (e.g., UKKZ444)">
        <button class="btn" onclick="searchTracking()">Track Shipment</button>

        <div id="loader" class="loader"></div>

        <div id="result" style="display:none; margin-top:20px;">
            <h2 id="trk"></h2>
            <p><strong>Sender:</strong> <span id="sender"></span></p>
            <p><strong>Origin:</strong> <span id="origin"></span></p>
            <p><strong>Destination:</strong> <span id="destination"></span></p>
            <p><strong>Service:</strong> <span id="service"></span></p>
            <p><strong>ETA:</strong> <span id="eta"></span></p>

            <h3 class="success-text">Tracking Timeline</h3>
            <div id="timeline"></div>
        </div>

        <p id="notFound" style="display:none; color:#ff7070; margin-top:20px;">
            ❌ Tracking number not found.
        </p>
    </div>

</div>

<script>
/* ==========================================================
   DEMO TRACKING DATABASE
========================================================== */

const DB = {
    "UKKZ001": {
        sender: "Louise Klaus",
        origin: "Heathrow Airport, London, UK",
        destination: "Kasymbek village, Zhambyl district, Almaty region, Kazakhstan",
        service: "Air Express",
        eta: "2025-12-10",
        events: [
            { date: "2025-12-07 14:20", location: "Heathrow, UK", status: "Departed origin" },
            { date: "2025-12-06 10:12", location: "Heathrow, UK", status: "Picked up by carrier" },
            { date: "2025-12-05 08:10", location: "London, UK", status: "Label created — awaiting pickup" }
            { date: "2025-12-05 08:10", location: "Almaty region, Kazakhstan", status: "Label created — awaiting pickup" }
        ]
    },

    "UKID001": {
        sender: "Louise Klaus",
        origin: "Heathrow Airport, London, UK",
        destination: "Jakarta, Indonesia",
        service: "Air Cargo Priority",
        eta: "2025-12-12",
        events: [
            { date: "2025-12-07 12:00", location: "Heathrow, UK", status: "Departed origin" },
            { date: "2025-12-06 09:33", location: "London, UK", status: "Picked up by carrier" },
            { date: "2025-12-05 07:55", location: "London, UK", status: "Label created" }
        ]
    },

    "UKTH001": {
        sender: "Louise Klaus",
        origin: "Heathrow Airport, London, UK",
        destination: "Bangkok, Thailand",
        service: "Express Freight",
        eta: "2025-12-11",
        events: [
            { date: "2025-12-07 10:45", location: "Heathrow, UK", status: "Departed origin" },
            { date: "2025-12-06 09:00", location: "London, UK", status: "Checked in at facility" },
            { date: "2025-12-05 06:40", location: "London, UK", status: "Label created" }
        ]
    }
};

/* ==========================================================
   SEARCH & DISPLAY FUNCTION
========================================================== */
function searchTracking() {

    const code = document.getElementById("trackingInput").value.trim().toUpperCase();
    const loader = document.getElementById("loader");
    const result = document.getElementById("result");
    const notFound = document.getElementById("notFound");

    result.style.display = "none";
    notFound.style.display = "none";

    if (!code) return;

    loader.style.display = "block";

    setTimeout(() => {
        loader.style.display = "none";

        const data = DB[code];

        if (!data) {
            notFound.style.display = "block";
            return;
        }

        document.getElementById("trk").innerText = "Tracking: " + code;
        document.getElementById("sender").innerText = data.sender;
        document.getElementById("origin").innerText = data.origin;
        document.getElementById("destination").innerText = data.destination;
        document.getElementById("service").innerText = data.service;
        document.getElementById("eta").innerText = data.eta;

        let html = "";
        data.events.forEach(ev => {
            html += `
                <div class="timeline-item">
                    <strong>${ev.status}</strong>
                    <br>
                    <span style="color:#aaa;">${ev.date} — ${ev.location}</span>
                </div>
            `;
        });

        document.getElementById("timeline").innerHTML = html;

        result.style.display = "block";

    }, 1200);
}
</script>

</body>
</html>
